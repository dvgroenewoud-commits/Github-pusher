<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Pusher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0d0f10;
    --surface: #161a1d;
    --border: #2a2f33;
    --accent: #00e5a0;
    --accent-dim: #00e5a020;
    --warn: #ff6b35;
    --text: #e8eaec;
    --muted: #6b7280;
    --input-bg: #1c2126;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 24px 16px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  header span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 14px;
  }

  .section-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 140px;
  }

  label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  input, textarea {
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input:focus, textarea:focus { border-color: var(--accent); }
  input[type="password"] { letter-spacing: 2px; }

  textarea {
    resize: vertical;
    min-height: 260px;
    line-height: 1.5;
    tab-size: 2;
  }

  button {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    border: none;
    padding: 10px 20px;
    transition: all 0.15s;
  }

  .btn-push {
    background: var(--accent);
    color: #0d0f10;
    white-space: nowrap;
  }
  .btn-push:hover { filter: brightness(1.1); }
  .btn-push:active { transform: scale(0.98); }
  .btn-push:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-secondary {
    background: var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 8px 14px;
  }
  .btn-secondary:hover { background: #3a3f44; color: var(--text); }

  .btn-danger {
    background: transparent;
    border: 1px solid var(--warn);
    color: var(--warn);
    font-size: 10px;
    padding: 4px 8px;
  }
  .btn-danger:hover { background: #ff6b3520; }

  /* REPO PROFILES */
  .profiles-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }

  .profile-card {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .profile-card:hover { border-color: var(--accent); color: var(--accent); }
  .profile-card.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

  .profile-card .del {
    font-size: 10px;
    color: var(--muted);
    padding: 2px 5px;
    border-radius: 3px;
    line-height: 1;
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: monospace;
  }
  .profile-card .del:hover { color: var(--warn); }

  .add-profile-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-wrap: wrap;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .add-profile-row .field { min-width: 120px; }

  /* FILE */
  .file-path-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .file-path-row .field { flex: 1; }

  .commit-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .commit-row .field { flex: 1; min-width: 200px; }

  .file-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .file-chip {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .file-chip:hover { background: #00e5a040; }

  .char-count {
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    margin-top: 3px;
  }

  #log {
    background: #0a0c0d;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    min-height: 60px;
    font-size: 12px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--muted);
  }

  .log-success { color: var(--accent); }
  .log-error { color: var(--warn); }
  .log-info { color: #60a5fa; }

  .token-note {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.6;
  }
  .token-note a { color: var(--accent); text-decoration: none; }

  .spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid #0d0f10;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .active-repo-badge {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .active-repo-badge span { color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>⬆ GitHub Pusher</h1>
  <span>Claude Code → GitHub</span>
</header>

<!-- TOKEN -->
<div class="section">
  <div class="section-title">🔑 GitHub Token</div>
  <div class="row">
    <div class="field">
      <label>Personal Access Token (PAT)</label>
      <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
    </div>
  </div>
  <p class="token-note">
    Token nodig? → <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens/new</a> — scope: <strong>repo</strong>
  </p>
  <div style="display:flex;gap:8px;margin-top:10px">
    <button class="btn-secondary" onclick="saveToken()">💾 Token opslaan</button>
    <button class="btn-secondary" onclick="testToken()">🔎 Testen</button>
  </div>
</div>

<!-- REPO PROFILES -->
<div class="section">
  <div class="section-title">📁 Repo Profielen</div>

  <div id="profilesGrid" class="profiles-grid"></div>

  <div class="add-profile-row">
    <div class="field">
      <label>Owner</label>
      <input type="text" id="newOwner" placeholder="dvgroenewoud-commits">
    </div>
    <div class="field">
      <label>Repo</label>
      <input type="text" id="newRepo" placeholder="Whispr-flow">
    </div>
    <div class="field" style="max-width:100px">
      <label>Branch</label>
      <input type="text" id="newBranch" placeholder="main">
    </div>
    <button class="btn-secondary" onclick="addProfile()" style="height:38px;margin-bottom:0">＋ Toevoegen</button>
  </div>
</div>

<!-- FILE -->
<div class="section">
  <div class="section-title">📄 Bestand</div>
  <div id="activeRepoBadge" class="active-repo-badge">Geen repo geselecteerd</div>

  <div class="file-path-row">
    <div class="field">
      <label>Bestandspad (in repo)</label>
      <input type="text" id="filepath" placeholder="index.html  of  src/app.js">
    </div>
    <button class="btn-secondary" onclick="fetchFile()" style="height:38px;margin-bottom:0">⬇ Ophalen</button>
  </div>

  <div id="knownFiles" class="file-list" style="margin-top:8px;margin-bottom:4px"></div>

  <div style="margin-top:10px">
    <label>Bestandsinhoud</label>
    <textarea id="content" placeholder="Plak hier je code..." spellcheck="false" oninput="updateCount()"></textarea>
    <div class="char-count" id="charCount">0 tekens</div>
  </div>
</div>

<!-- PUSH -->
<div class="section">
  <div class="section-title">🚀 Push naar GitHub</div>
  <div class="commit-row">
    <div class="field">
      <label>Commit bericht</label>
      <input type="text" id="commitMsg" placeholder="Update via GitHub Pusher">
    </div>
    <button class="btn-push" id="pushBtn" onclick="pushFile()">⬆ Push bestand</button>
  </div>
</div>

<!-- LOG -->
<div class="section">
  <div class="section-title">📋 Log</div>
  <div id="log">Wachten op actie...</div>
</div>

<script>
// ── Storage helpers ──────────────────────────────────────────
const LS = {
  get: k => localStorage.getItem('ghp_' + k) || '',
  set: (k,v) => localStorage.setItem('ghp_' + k, v),
  getJSON: (k, def) => { try { return JSON.parse(localStorage.getItem('ghp_' + k)) || def; } catch { return def; } },
  setJSON: (k,v) => localStorage.setItem('ghp_' + k, JSON.stringify(v))
};

let activeProfile = null;
let currentSha = null;

// ── Init ─────────────────────────────────────────────────────
window.onload = () => {
  document.getElementById('token').value = LS.get('token');

  // Migrate old single-repo config to profile if needed
  const oldOwner = LS.get('owner');
  const oldRepo  = LS.get('repo');
  if (oldOwner && oldRepo) {
    const profiles = LS.getJSON('profiles', []);
    const exists = profiles.find(p => p.owner === oldOwner && p.repo === oldRepo);
    if (!exists) {
      profiles.push({ owner: oldOwner, repo: oldRepo, branch: LS.get('branch') || 'main' });
      LS.setJSON('profiles', profiles);
    }
  }

  // Pre-fill add-form with owner
  document.getElementById('newOwner').value = oldOwner || 'dvgroenewoud-commits';
  document.getElementById('newBranch').value = 'main';

  renderProfiles();

  // Auto-select last used profile
  const lastRepo = LS.get('lastRepo');
  if (lastRepo) {
    const profiles = LS.getJSON('profiles', []);
    const p = profiles.find(p => p.repo === lastRepo);
    if (p) selectProfile(p, false);
  }
};

// ── Profiles ─────────────────────────────────────────────────
function renderProfiles() {
  const profiles = LS.getJSON('profiles', []);
  const grid = document.getElementById('profilesGrid');

  if (profiles.length === 0) {
    grid.innerHTML = '<span style="font-size:11px;color:var(--muted)">Nog geen profielen — voeg er hieronder een toe.</span>';
    return;
  }

  grid.innerHTML = profiles.map((p, i) => `
    <div class="profile-card ${activeProfile && activeProfile.repo === p.repo ? 'active' : ''}"
         onclick="selectProfile(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <span>${p.repo}</span>
      <span style="font-size:9px;color:var(--muted)">${p.branch}</span>
      <button class="del" onclick="event.stopPropagation();deleteProfile(${i})" title="Verwijder">✕</button>
    </div>
  `).join('');
}

function selectProfile(p, save = true) {
  activeProfile = p;
  if (save) LS.set('lastRepo', p.repo);
  currentSha = null;
  document.getElementById('activeRepoBadge').innerHTML =
    `Actief: <span>${p.owner}/${p.repo}</span> (${p.branch})`;
  document.getElementById('filepath').value = '';
  document.getElementById('content').value = '';
  document.getElementById('charCount').textContent = '0 tekens';
  renderProfiles();
  renderKnownFiles();
  log(`📁 Repo geselecteerd: ${p.owner}/${p.repo} (${p.branch})`, 'info');
}

function addProfile() {
  const owner  = document.getElementById('newOwner').value.trim();
  const repo   = document.getElementById('newRepo').value.trim();
  const branch = document.getElementById('newBranch').value.trim() || 'main';
  if (!owner || !repo) { log('⚠️ Vul owner én repo in.', 'error'); return; }

  const profiles = LS.getJSON('profiles', []);
  if (profiles.find(p => p.owner === owner && p.repo === repo)) {
    log('⚠️ Dit profiel bestaat al.', 'error'); return;
  }
  profiles.push({ owner, repo, branch });
  LS.setJSON('profiles', profiles);
  document.getElementById('newRepo').value = '';
  renderProfiles();
  log(`✅ Profiel toegevoegd: ${owner}/${repo}`, 'success');
}

function deleteProfile(i) {
  const profiles = LS.getJSON('profiles', []);
  const removed = profiles.splice(i, 1)[0];
  LS.setJSON('profiles', profiles);
  if (activeProfile && activeProfile.repo === removed.repo) {
    activeProfile = null;
    document.getElementById('activeRepoBadge').innerHTML = 'Geen repo geselecteerd';
  }
  renderProfiles();
  log(`🗑 Profiel verwijderd: ${removed.repo}`, 'info');
}

// ── Token ────────────────────────────────────────────────────
function saveToken() {
  LS.set('token', document.getElementById('token').value.trim());
  log('✅ Token opgeslagen.', 'success');
}

async function testToken() {
  const token = document.getElementById('token').value.trim();
  if (!token) { log('⚠️ Vul eerst een token in.', 'error'); return; }
  log('Testen...', 'info');
  try {
    const r = await fetch('https://api.github.com/user', {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    const d = await r.json();
    r.ok ? log(`✅ Token geldig — ingelogd als: ${d.login}`, 'success')
         : log(`❌ Token ongeldig: ${d.message}`, 'error');
  } catch(e) { log('❌ Netwerkfout: ' + e.message, 'error'); }
}

// ── Known files ───────────────────────────────────────────────
function knownFilesKey() {
  return activeProfile ? `files_${activeProfile.owner}_${activeProfile.repo}` : null;
}

function addKnownFile(path) {
  const k = knownFilesKey(); if (!k) return;
  let files = LS.getJSON(k, []);
  files = [path, ...files.filter(f => f !== path)].slice(0, 20);
  LS.setJSON(k, files);
  renderKnownFiles();
}

function renderKnownFiles() {
  const k = knownFilesKey();
  const files = k ? LS.getJSON(k, []) : [];
  document.getElementById('knownFiles').innerHTML = files.map(f =>
    `<span class="file-chip" onclick="quickLoad('${f}')">${f}</span>`
  ).join('');
}

function quickLoad(path) {
  document.getElementById('filepath').value = path;
  fetchFile();
}

// ── Fetch file ────────────────────────────────────────────────
async function fetchFile() {
  if (!activeProfile) { log('⚠️ Selecteer eerst een repo-profiel.', 'error'); return; }
  const { owner, repo, branch } = activeProfile;
  const token = document.getElementById('token').value.trim();
  const path  = document.getElementById('filepath').value.trim();
  if (!path)  { log('⚠️ Vul een bestandspad in.', 'error'); return; }
  if (!token) { log('⚠️ Vul je token in.', 'error'); return; }

  log(`⬇ Ophalen: ${path} (${branch})...`, 'info');
  try {
    const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    const d = await r.json();
    if (r.ok) {
      currentSha = d.sha;
      const decoded = decodeURIComponent(escape(atob(d.content.replace(/\n/g, ''))));
      document.getElementById('content').value = decoded;
      updateCount();
      addKnownFile(path);
      log(`✅ Geladen (${decoded.length} tekens, sha: ${d.sha.slice(0,7)})`, 'success');
    } else {
      currentSha = null;
      log(`⚠️ Niet gevonden (${d.message}) — nieuw bestand bij push.`, 'info');
    }
  } catch(e) { log('❌ Fout: ' + e.message, 'error'); }
}

// ── Push file ─────────────────────────────────────────────────
async function pushFile() {
  if (!activeProfile) { log('⚠️ Selecteer eerst een repo-profiel.', 'error'); return; }
  const { owner, repo, branch } = activeProfile;
  const token   = document.getElementById('token').value.trim();
  const path    = document.getElementById('filepath').value.trim();
  const content = document.getElementById('content').value;
  const msg     = document.getElementById('commitMsg').value.trim() || 'Update via GitHub Pusher';

  if (!token)   { log('⚠️ Vul je token in.', 'error'); return; }
  if (!path)    { log('⚠️ Vul een bestandspad in.', 'error'); return; }
  if (!content) { log('⚠️ Bestandsinhoud is leeg.', 'error'); return; }

  const btn = document.getElementById('pushBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Pushen...';

  if (!currentSha) {
    try {
      const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`, {
        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (r.ok) { const d = await r.json(); currentSha = d.sha; }
    } catch {}
  }

  const body = { message: msg, content: btoa(unescape(encodeURIComponent(content))), branch };
  if (currentSha) body.sha = currentSha;

  log(`⬆ Pushen naar ${owner}/${repo}/${path}...`, 'info');
  try {
    const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
      method: 'PUT',
      headers: {
        Authorization: `token ${token}`,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (r.ok) {
      currentSha = d.content.sha;
      addKnownFile(path);
      log(`✅ Gepushed! Commit: ${d.commit.sha.slice(0,7)} — "${msg}"`, 'success');
      log(`🔗 ${d.content.html_url}`, 'success');
    } else {
      log(`❌ Fout: ${d.message}`, 'error');
    }
  } catch(e) { log('❌ Netwerkfout: ' + e.message, 'error'); }

  btn.disabled = false;
  btn.innerHTML = '⬆ Push bestand';
}

// ── Helpers ───────────────────────────────────────────────────
function updateCount() {
  const n = document.getElementById('content').value.length;
  document.getElementById('charCount').textContent = n.toLocaleString('nl-NL') + ' tekens';
}

function log(msg, type) {
  const el  = document.getElementById('log');
  const ts  = new Date().toLocaleTimeString('nl-NL');
  const cls = type === 'success' ? 'log-success' : type === 'error' ? 'log-error' : 'log-info';
  el.innerHTML += `<span class="${cls}">[${ts}] ${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}
</script>
</body>
</html>
